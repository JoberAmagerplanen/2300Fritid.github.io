<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2300Fritid - Activity Map</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>🎯 2300Fritid</h1>
    <p>Discover activities and events in your area</p>
  </header>

  <main>
    <div class="map-container" id="mapContainer">
      <!-- Map image or background -->
      <img src="https://via.placeholder.com/1200x700/e8eef7/4a5f8f?text=Activity+Map" 
           alt="Activity Map" 
           class="map-image" 
           id="mapImage">
      
      <!-- Pins overlay -->
      <div class="pins-overlay" id="pinsOverlay"></div>

      <!-- Sidebar for activity list -->
      <div class="sidebar" id="sidebar">
        <h2>📍 Activities</h2>
        <div id="activityList"></div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
